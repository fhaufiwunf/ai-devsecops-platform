services:
  dashboard:
    build: ./dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./dashboard/data:/app/data
    env_file:
      - .env

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    env_file:
      - .env
